[pytest]
# Pytest configuration for flight booking tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = tests

# Minimum version
minversion = 7.0

# Output options
addopts = 
    -v
    -s
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# Markers for categorizing tests
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    validation: marks tests for input validation
    performance: marks tests for performance checks
    edge_case: marks tests for edge cases
    industry_standard: marks tests for industry standards

# Async configuration
asyncio_mode = auto

# Coverage options (if using pytest-cov)
# addopts = --cov=app --cov-report=html --cov-report=term

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (in seconds)
# timeout = 300
