<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Branding -->
        <title>FareClubs — Cheap Flight Tickets & Booking</title>
        <meta
            name="description"
            content="Search and book cheap flight tickets on FareClubs. Compare fares from top airlines, get the best deals on domestic and international flights."
        />
        <link rel="icon" type="image/svg+xml" href="src/assets/Farelogo.png" />

        <!-- Open Graph (social sharing previews) -->
        <meta property="og:type" content="website" />
        <meta property="og:title" content="FareClubs — Cheap Flight Tickets" />
        <meta
            property="og:description"
            content="Compare fares from top airlines. Book domestic and international flights at the best prices."
        />
        <meta property="og:url" content="https://www.fareclubs.com" />

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary" />
        <meta name="twitter:title" content="FareClubs — Cheap Flight Tickets" />
        <meta
            name="twitter:description"
            content="Compare fares from top airlines. Book domestic and international flights."
        />

        <!-- Theme color (mobile browser address bar) -->
        <meta name="theme-color" content="#FF2E57" />
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
