services:
  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres # DB name
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - appnet
  
  redis:
    image: redis:7
    restart: always
    networks:
      - appnet

  backend:
    build:
      context: ./backend # path to the dockerfile
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env
      - ./backend/.env
    depends_on:
      - db
      - redis
    expose:
      - "8000"    # accessible to other containers only
    volumes:
      - ./backend:/app
    networks:
      - appnet

  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   restart: "no"       # optional: we don't need to run frontend in prod, only build it
  #   env_file:
  #     - ./.env
  #     - ./frontend/.env
  #   depends_on:
  #     - backend
  #   expose:
  #     - 80
  #   # volumes:
  #   #   - ./frontend:/app
  #   #   - /app/node_modules # exclude node_modules from the volume
  #   networks:
  #     - appnet

  # Single root nginx serves the frontend static files and proxies /api to backend
  nginx:
  # build image form frontend/Dockerfile
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports: ["80:80"] # only nginx is exposed to host
    # but mount a config file from root/nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - appnet

volumes:
  postgres-data:

networks:
  appnet:
    driver: bridge 